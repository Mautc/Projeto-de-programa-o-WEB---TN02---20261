<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Layout 3 - GitHub</title>
    <link rel="stylesheet" href="layout3.css">
</head>
<body>

    <header>
        <div class="logo">GitHub</div>
        <nav>
            <a href="#">Plataforma</a>
            <a href="#">Soluções</a>
            <a href="#">Recursos</a>
            <a href="#">Código aberto</a>
            <a href="#">Enterprise</a>
            <a href="#">Preços</a>
        </nav>
        <div class="acoes">
            <a href="#">Entrar</a>
            <a href="#" class="btn-outline">Criar uma conta</a>
        </div>
    </header>

    <main>
        <div class="hero">
            <h1>O futuro do desenvolvimento de software acontece em conjunto</h1>
            <p>As ferramentas e as tendências evoluem, mas a colaboração permanece. Texto de exemplo.</p>
            <div class="formulario">
                <input type="email" placeholder="Digite seu e-mail">
                <button class="btn-verde">Cadastrar-se no GitHub</button>
                <button class="btn-escuro">Experimente o GitHub Copilot Free</button>
            </div>
        </div>
    </main>

</body>
</html>
